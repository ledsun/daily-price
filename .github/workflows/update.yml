name: Update prices

on:
  schedule:
    - cron: "23 */4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Fetch prices
        run: ruby scripts/fetch_prices.rb

      - name: Build HTML
        run: ruby scripts/build_html.rb

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json web/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update prices and HTML [skip ci]"
            git push
          fi
